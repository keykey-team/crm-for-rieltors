services:
  db:
    image: postgres:16-alpine
    container_name: crm-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: crm
    ports:
      - "5432:5432"
    volumes:
      - crm_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d crm"]
      interval: 5s
      timeout: 5s
      retries: 10

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: crm-server
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: 4000
      NODE_ENV: development
      CLIENT_URL: http://localhost:3000
      DATABASE_URL: postgresql://postgres:postgres@db:5432/crm?schema=public
      JWT_SECRET: change-me-local-secret
      AWS_REGION: us-east-1
      AWS_BUCKET_NAME: ""
      AWS_FOLDER_PREFIX: ""
    ports:
      - "4000:4000"
    volumes:
      - ./server/src:/app/src
      - ./server/prisma:/app/prisma
      - ./server/tsconfig.json:/app/tsconfig.json
    command: sh -c "npx prisma generate && npx prisma db push && npm run dev"

volumes:
  crm_postgres_data:
