name: CI

on:
  pull_request:
    branches: [develop, main, feature/spark-suite-integration, feature/spark-adding-realtor-suite]
  push:
    branches: [develop, main]

jobs:
  client-checks:
    name: Client — lint & typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: client/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Typecheck
        run: npm run typecheck

  server-checks:
    name: Server — typecheck & tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Generate Prisma client
        run: npm run prisma:generate
      - name: Typecheck
        run: npx tsc --noEmit
      - name: Run tests
        run: npm test
